version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      typescript:
        patterns:
          - "typescript"
          - "typescript-eslint"
          - "tslib"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
    ignore:
      # Ignore major version bumps for React to avoid breaking changes
      - dependency-name: "react"
        update-types: [ "version-update:semver-major" ]
      - dependency-name: "react-dom"
        update-types: [ "version-update:semver-major" ]
